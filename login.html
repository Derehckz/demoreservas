<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cabañas Eli</title>
  <script src="/js/config.js"></script>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/theme.css">
  <style>
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #f0fdfa 0%, #e0f2fe 30%, #fefce8 70%, #fef3c7 100%);
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(13, 148, 136, 0.12), transparent),
                  radial-gradient(ellipse 60% 40% at 100% 100%, rgba(245, 158, 11, 0.1), transparent);
      pointer-events: none;
    }
    .login-card {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08),
                  0 0 0 1px rgba(13, 148, 136, 0.05);
    }
    .login-card:hover {
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1),
                  0 0 0 1px rgba(13, 148, 136, 0.08);
    }
    .input-field {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
      outline: none;
    }
    .btn-login {
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
      box-shadow: 0 4px 14px rgba(13, 148, 136, 0.35);
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(13, 148, 136, 0.4);
    }
    .btn-login:active:not(:disabled) {
      transform: translateY(0);
    }
    .brand-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
      box-shadow: 0 8px 24px rgba(13, 148, 136, 0.3);
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">
  <div class="login-card rounded-2xl p-8 w-full max-w-sm relative z-10 theme-animate-in" style="animation: fade-in-up 0.5s ease-out;">
    <div class="text-center mb-8">
      <div class="brand-icon rounded-2xl flex items-center justify-center mx-auto mb-4 text-3xl">
        🏡
      </div>
      <h1 id="brandTitle" class="text-2xl font-bold text-stone-800 tracking-tight">Cabañas Eli</h1>
      <p class="text-stone-500 text-sm mt-1.5 font-medium">Panel de reservas</p>
    </div>

    <div id="errorMsg" class="hidden bg-red-50 border border-red-200/80 text-red-700 rounded-xl p-3.5 mb-4 text-sm text-center font-medium"></div>

    <form id="loginForm" autocomplete="on">
      <div class="relative mb-5">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Contraseña"
          autocomplete="current-password"
          class="input-field w-full border-2 border-stone-200 rounded-xl px-4 py-3.5 pr-24 text-base font-medium text-stone-800 placeholder-stone-400 bg-white"
          autofocus
        />
        <button
          type="button"
          id="togglePassword"
          class="absolute inset-y-0 right-3 flex items-center text-xs font-semibold text-teal-600 hover:text-teal-700 transition-colors"
          tabindex="0"
          aria-label="Mostrar u ocultar contraseña"
        >
          Mostrar
        </button>
      </div>
      <button
        type="submit"
        id="submitBtn"
        class="btn-login w-full text-white rounded-xl px-4 py-3.5 text-base font-bold"
      >
        Ingresar
      </button>
    </form>
  </div>

  <script>
    if (sessionStorage.getItem('mis_reservas_auth') === '1') {
      window.location.replace('index.html');
    }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      const btn = document.getElementById('submitBtn');

      if (!password) return;

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errorDiv.classList.add('hidden');

      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.ok) {
          sessionStorage.setItem('mis_reservas_auth', '1');
          sessionStorage.setItem('mis_reservas_token', data.token || '');
          window.location.replace('index.html');
        } else {
          errorDiv.textContent = data.error || 'Contraseña incorrecta';
          errorDiv.classList.remove('hidden');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errorDiv.textContent = 'Error de conexión. Intenta nuevamente.';
        errorDiv.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    });

    (function () {
      const input = document.getElementById('password');
      const toggle = document.getElementById('togglePassword');
      if (!input || !toggle) return;
      toggle.addEventListener('click', () => {
        const isPass = input.type === 'password';
        input.type = isPass ? 'text' : 'password';
        toggle.textContent = isPass ? 'Ocultar' : 'Mostrar';
      });
    })();

    (function(){
      var n=(typeof APP_CONFIG!=='undefined'&&APP_CONFIG.nombreNegocio)||'Cabañas Eli';
      document.title=n;
      var el=document.getElementById('brandTitle');
      if(el)el.textContent=n;
    })();
  </script>
</body>
</html>
